# Project Sunrise Charter

## Product
Mama Lu's Ordering Platform

## Version 1 mission
Make it easy for customers to order breakfast burritos and easy for Mama Lu's to receive clean, readable orders.

## Core tests

### Grandma Test
A customer with very little technical experience should be able to place an order without help.

### Thumb Test
A customer should be able to use the site comfortably on a phone with one hand.

### Restaurant Test
The system should reduce confusion and save time during a busy breakfast rush.

## Version 1 scope
- Browse breakfast burritos
- Customize each burrito
- Add beans per burrito
- Review cart
- Enter customer information
- Review order before submitting
- Submit order by email
- Receive confirmation with order number

